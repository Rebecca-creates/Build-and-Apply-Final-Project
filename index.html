<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Module 3 FInal Project</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/d77651993d.js"
      crossorigin="anonymous"
    ></script>
    <script src="index.jss"></script>
  </head>
  <body>
    <nav>
      <div class="row nav__row">
        <div class="nav__logo--img">
          <img
            src="./assets/logo.2c489fc453a1783cbadacf914efa3df6.svg"
            alt=""
          />
          <div class="nav__logo--title">Treact</div>
        </div>
        <ul class="nav__links">
          <a href="#" class="nav__link">About</a>
          <a href="#" class="nav__link">Blog</a>
          <a href="#" class="nav__link">Pricing</a>
          <a href="#" class="nav__link">Contact Us</a>
          <a href="#" class="nav__link nav__link--login">Login</a>
          <a href="#" class="nav__link nav__link--primary">Sign Up</a>
        </ul>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="header__description">
          <h1>
            Beautiful React Templates <span class="purple">for you.</span>
          </h1>
          <div class="header__description--para">
            <p>
              Our templates are easy to setup, understand and customize. Fully
              modular components with a variety of pages and components.
            </p>
          </div>
          <div class="header__email">
            <input
              type="text"
              class="header__email--input"
              placeholder="Your Email Address"
            />
            <button class="header__email--btn">Get Started</button>
          </div>
          <p class="header__customers">OUR TRUSTED CUSTOMERS</p>
          <img
            src="./assets/customers-logo-strip.680ac7c2e8ae28161d2c.png"
            alt=""
            class="header__customer--img"
          />
        </div>
        <figure class="header__img--wrapper">
          <img src="./assets/design-illustration-2.6da6a00b20c07c4a9b65d1870679e1b8.svg" alt="" class="header__img">
        </figure>
      </div>
    </div>
  </body>
</html>
